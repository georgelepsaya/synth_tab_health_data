$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../../experiments/synthcity
command: >
  python run_experiment_synthcity.py
  ${{inputs.model_name}}
  ${{inputs.dataset_path}}
  ${{outputs.metrics_report}}
  ${{inputs.target_col}}
  ${{inputs.n_trials}}
  "${{inputs.sep}}"
environment: azureml:synthtabhealthdata@latest
inputs:
  model_name: ctgan
  target_col: Diagnosis
  n_trials: 50
  sep: ","
  dataset_path:
    type: uri_file
    path: azureml:breast_cancer:1
outputs:
  metrics_report:
    type: uri_file
    path: azureml://datastores/workspaceblobstore/paths/metrics_evals/ctgan_eval_breast_cancer.csv
    name: ctgan_eval_breast_cancer
compute: azureml:gpu-cluster
display_name: breast_cancer_ctgan
experiment_name: evaluate_ctgan
description: Train, tune and evaluate CTGAN on the Breast Cancer dataset
