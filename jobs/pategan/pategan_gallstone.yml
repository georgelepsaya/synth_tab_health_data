$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../../experiments/synthcity
command: >
  python run_experiment_synthcity.py
  ${{inputs.model_name}}
  ${{inputs.dataset_path}}
  ${{outputs.metrics_report}}
  ${{inputs.target_col}}
  ${{inputs.n_trials}}
  "${{inputs.sep}}"
environment: azureml:synthtabhealthdata@latest
inputs:
  model_name: pategan
  target_col: gallstone_status
  n_trials: 50
  sep: ","
  dataset_path:
    type: uri_file
    path: azureml:gallstone:2
outputs:
  metrics_report:
    type: uri_file
    path: azureml://datastores/workspaceblobstore/paths/metrics_evals/pategan_eval_gallstone.csv
    name: pategan_eval_gallstone
compute: azureml:gpu-cluster
display_name: gallstone_pategan
experiment_name: evaluate_pategan
description: Train, tune and evaluate PATEGAN on the Gallstone dataset
