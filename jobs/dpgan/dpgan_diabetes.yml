$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../../experiments/synthcity
command: >
  python run_experiment_synthcity.py
  ${{inputs.model_name}}
  ${{inputs.dataset_path}}
  ${{outputs.metrics_report}}
  ${{inputs.target_col}}
  ${{inputs.n_trials}}
  "${{inputs.sep}}"
environment: azureml:synthtabhealthdata@latest
inputs:
  model_name: dpgan
  target_col: Outcome
  n_trials: 50
  sep: ","
  dataset_path:
    type: uri_file
    path: azureml:diabetes:1
outputs:
  metrics_report:
    type: uri_file
    path: azureml://datastores/workspaceblobstore/paths/metrics_evals/dpgan_eval_diabetes.csv
    name: dpgan_eval_diabetes
compute: azureml:gpu-cluster
display_name: diabetes_dpgan
experiment_name: evaluate_dpgan
description: Train, tune and evaluate DP-GAN on the Diabetes dataset
