$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../../experiments/synthcity
command: >
  python run_experiment_synthcity.py
  ${{inputs.model_name}}
  ${{inputs.dataset_path}}
  ${{outputs.metrics_report}}
  ${{inputs.target_col}}
  ${{inputs.n_trials}}
  "${{inputs.sep}}"
environment: azureml:synthtabhealthdata@latest
inputs:
  model_name: great
  target_col: cardio
  n_trials: 15
  sep: ";"
  dataset_path:
    type: uri_file
    path: azureml:cardio_train:1
outputs:
  metrics_report:
    type: uri_file
    path: azureml://datastores/workspaceblobstore/paths/metrics_evals/great_eval_cardio_train.csv
    name: great_eval_cardio_train
compute: azureml:gpu-cluster
display_name: cardio_train_great
experiment_name: evaluate_great
description: Train, tune and evaluate GReaT on the Cardio Train dataset
